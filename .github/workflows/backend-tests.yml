name: Backend Tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest


    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend unit tests
        run: npm run test:unit -- --coverage --coverageDirectory coverage/unit

      - name: Upload backend unit coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-unit-coverage
          path: backend/coverage/unit

  backend-integration-tests:
    runs-on: ubuntu-latest


    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend integration tests
        run: npm run test:integration -- --coverage --coverageDirectory coverage/integration

      - name: Upload backend integration coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-integration-coverage
          path: backend/coverage/integration

  backend-coverage-summary:
    runs-on: ubuntu-latest
    needs:
      - backend-unit-tests
      - backend-integration-tests


    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate combined coverage snapshot
        run: npm run test:coverage

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage
